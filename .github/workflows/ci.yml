name: Tests and Docs Deployment

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "Sphinx>=9.1,<10.0"
          pip install -r requirements/dev.txt

      - name: Lint
        run: |
          ruff check lightbox tests docs/_ext scripts/validate_docs.py scripts/validate_dist.py
          ruff format --check lightbox tests docs/_ext scripts/validate_docs.py scripts/validate_dist.py

      - name: Type-check
        run: mypy lightbox

  test:
    name: Python ${{ matrix.python-version }} / Sphinx ${{ matrix.sphinx-version }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        sphinx-version: ["7.0", "7.4", "8.0", "8.2", "9.0", "9.1"]
        exclude:
          - python-version: "3.10"
            sphinx-version: "8.2"
          - python-version: "3.10"
            sphinx-version: "9.0"
          - python-version: "3.10"
            sphinx-version: "9.1"
          - python-version: "3.11"
            sphinx-version: "9.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ matrix.sphinx-version }}-${{ hashFiles('requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ matrix.sphinx-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Sphinx~=${{ matrix.sphinx-version }}"
          pip install -r requirements/dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

  docs-check:
    name: Build and validate docs
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/docs.txt
          pip install .

      - name: Build HTML documentation
        run: |
          mkdir -p docs/_downloads
          touch docs/_downloads/sphinx-lightbox.pdf
          sphinx-build -W --keep-going -E -a -b html docs docs/_build/html

      - name: Validate generated HTML
        run: python scripts/validate_docs.py docs/_build/html

  browser-smoke:
    name: Browser smoke tests
    needs: docs-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/docs.txt
          pip install .

      - name: Build HTML documentation
        run: |
          mkdir -p docs/_downloads
          touch docs/_downloads/sphinx-lightbox.pdf
          sphinx-build -W --keep-going -E -a -b html docs docs/_build/html

      - name: Install Playwright
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Smoke test keyboard lightbox behavior
        run: |
          python - <<'PY'
          import asyncio
          from pathlib import Path
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(viewport={"width": 1280, "height": 800})
                  await page.goto(Path("docs/_build/html/index.html").resolve().as_uri())
                  await page.locator(".lightbox-trigger-label").first.focus()
                  await page.keyboard.press("Enter")
                  await page.wait_for_function(
                      "() => document.querySelector('.lightbox-toggle:checked') !== null"
                  )
                  await page.locator(".lightbox-overlay").first.wait_for(state="visible")
                  await page.keyboard.press("Escape")
                  await page.wait_for_function(
                      "() => document.querySelector('.lightbox-toggle:checked') === null"
                  )
                  await page.locator(".lightbox-overlay").first.wait_for(state="hidden")
                  await browser.close()

          asyncio.run(main())
          PY

  deploy-docs:
    name: Deploy GitHub Pages documentation
    needs: [test, docs-check, browser-smoke]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        id: setup-python-docs
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ steps.setup-python-docs.outputs.python-version }}-${{ hashFiles('requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-${{ steps.setup-python-docs.outputs.python-version }}-

      - name: Cache LaTeX packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-latex-packages-v1

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            tex-gyre \
            latexmk

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/docs.txt
          pip install .

      - name: Build documentation
        run: |
          mkdir -p docs/_downloads
          touch docs/_downloads/sphinx-lightbox.pdf
          sphinx-build -W --keep-going -E -a -b latex docs docs/_build/latex
          (cd docs/_build/latex && make)
          cp docs/_build/latex/*.pdf docs/_downloads/sphinx-lightbox.pdf
          sphinx-build -W --keep-going -E -a -b html docs docs/_build/html

      - name: Validate generated HTML
        run: python scripts/validate_docs.py docs/_build/html

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    name: Publish package to PyPI
    needs: [test, docs-check]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sphinx-lightbox
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          python -m twine check dist/*
          python scripts/validate_dist.py dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
