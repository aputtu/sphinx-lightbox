[tox]
parallel = auto
envlist =
    lint
    mypy
    docs
    py310-sphinx70
    py310-sphinx74
    py310-sphinx80
    py311-sphinx70
    py311-sphinx74
    py311-sphinx80
    py311-sphinx82
    py311-sphinx90
    py312-sphinx70
    py312-sphinx74
    py312-sphinx80
    py312-sphinx82
    py312-sphinx90
    py312-sphinx91
    py313-sphinx70
    py313-sphinx74
    py313-sphinx80
    py313-sphinx82
    py313-sphinx90
    py313-sphinx91
    py314-sphinx70
    py314-sphinx74
    py314-sphinx80
    py314-sphinx82
    py314-sphinx90
    py314-sphinx91
isolated_build = true

[testenv]
set_env =
    COVERAGE_FILE = {envdir}/.coverage
deps =
    pytest>=8.0
    pytest-sphinx==0.6.3
    pytest-cov>=4.0
    beautifulsoup4>=4.11.0
    coverage[toml]>=7.0
    sphinx70: Sphinx~=7.0.0
    sphinx74: Sphinx~=7.4.0
    sphinx80: Sphinx~=8.0.0
    sphinx82: Sphinx~=8.2.0
    sphinx90: Sphinx~=9.0.0
    sphinx91: Sphinx~=9.1.0
commands =
    pytest -o addopts="-v --strict-markers --tb=short --cov=lightbox --cov-report=term-missing:skip-covered --cov-report=html:{envdir}/htmlcov" {posargs}

[testenv:lint]
description = Run code quality checks
deps =
    ruff>=0.4
skip_install = true
commands =
    ruff check lightbox tests docs/_ext scripts
    ruff format --check lightbox tests docs/_ext scripts

[testenv:mypy]
description = Type checking with mypy
deps =
    mypy>=1.10
    types-docutils
    Sphinx>=9.1,<10.0
commands =
    mypy lightbox

[testenv:docs]
description = Build and validate documentation
changedir = {toxinidir}
deps =
    -r requirements/docs.txt
commands =
    python -c "from pathlib import Path; Path('docs/_downloads').mkdir(exist_ok=True); Path('docs/_downloads/sphinx-lightbox.pdf').touch()"
    sphinx-build -W --keep-going -E -a -d docs/_build/doctrees/html -b html docs docs/_build/html
    python scripts/validate_docs.py docs/_build/html

[testenv:coverage]
description = Generate coverage report
deps =
    {[testenv]deps}
    coverage[toml]>=7.0
commands =
    pytest -o addopts="-v --strict-markers --tb=short --cov=lightbox --cov-report=term-missing:skip-covered --cov-report=html:{envdir}/htmlcov"
